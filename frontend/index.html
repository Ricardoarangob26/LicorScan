<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LicorScan - Comparador de Precios</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./catalog-data.js"></script>
  <script>
    window.__SUPABASE_URL__ = "https://bwxxifwqnkrfbegoycod.supabase.co";
    window.__SUPABASE_ANON__ = "sb_publishable_3g_CcUcp3WI890zg0IGPeg_zI9j1QCq";
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: oklch(97.5% 0.006 85);
      --surface: #fff;
      --border: oklch(88% 0.008 80);
      --text: oklch(18% 0.01 260);
      --text2: oklch(45% 0.01 260);
      --accent: oklch(55% 0.2 250);
      --accent-light: oklch(95% 0.06 245);
      --radius: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.08);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
    a { color: inherit; }
    input, select, button { font-family: inherit; }
    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.12);
    }
    .drawer-enter {
      transform: translateX(0);
      opacity: 1;
    }
    .drawer-exit {
      transform: translateX(calc(100% + 12px));
      opacity: 0;
      pointer-events: none;
    }
    .data-source-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: 600;
    }
    .data-source-badge.live {
      background: #d1fae5;
      color: #065f46;
    }
    .data-source-badge.cache {
      background: #fef3c7;
      color: #92400e;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState, useEffect, useRef } = React;

    // Supabase config for plain browser deployment
    const SUPABASE_URL = window.__SUPABASE_URL__ || "https://bwxxifwqnkrfbegoycod.supabase.co";
    const SUPABASE_ANON = window.__SUPABASE_ANON__ || "sb_publishable_3g_CcUcp3WI890zg0IGPeg_zI9j1QCq";

    // Start with static catalog as fallback
    const STATIC_CATALOG = window.__CATALOG__ || { products: [], generated_at: null };

    async function fetchProductsFromSupabase() {
      try {
        const countRes = await fetch(
          `${SUPABASE_URL}/rest/v1/products?select=id&limit=1`,
          {
            headers: {
              apikey: SUPABASE_ANON,
              Authorization: `Bearer ${SUPABASE_ANON}`,
              Prefer: "count=exact",
            },
          }
        );
        if (!countRes.ok) throw new Error(`HTTP ${countRes.status}`);
        const total = parseInt(countRes.headers.get("content-range")?.split("/")[1] || "0");

        const pageSize = 1000;
        const pages = Math.ceil(total / pageSize);

        const requests = Array.from({ length: pages }, (_, i) =>
          fetch(
            `${SUPABASE_URL}/rest/v1/products?select=id,store,store_name,title,price,img,url,category,history&limit=${pageSize}&offset=${i * pageSize}`,
            {
              headers: {
                apikey: SUPABASE_ANON,
                Authorization: `Bearer ${SUPABASE_ANON}`,
              },
            }
          ).then(r => r.json())
        );

        const results = await Promise.all(requests);
        const allProducts = results.flat();
        console.log(`Supabase fetched ${allProducts.length} products`);
        return allProducts;
      } catch (error) {
        console.warn("Supabase fetch failed, using cached data:", error.message);
        return null;
      }
    }

    const STORE_COLORS = {
      exito: "oklch(58% 0.18 145)",
      d1: "oklch(52% 0.19 255)",
      carulla: "oklch(55% 0.18 25)",
      olimpica: "oklch(58% 0.2 310)",
    };

    const STORE_NAMES = { exito: "Éxito", d1: "D1", carulla: "Carulla", olimpica: "Olímpica" };

    function identifyStore(name) {
      const n = (name || "").toLowerCase();
      if (n.includes("éxito") || n.includes("exito")) return "exito";
      if (/\bd1\b/.test(n)) return "d1";
      if (n.includes("carulla")) return "carulla";
      if (n.includes("olímpica") || n.includes("olimpica")) return "olimpica";
      return null;
    }

    const CITY_CENTERS = [
      { name: "Bogotá",       bounds: [4.4,  5.0,  -74.30, -73.9] },
      { name: "Medellín",     bounds: [6.0,  6.5,  -75.70, -75.4] },
      { name: "Cali",         bounds: [3.2,  3.7,  -76.70, -76.3] },
      { name: "Barranquilla", bounds: [10.8, 11.1, -74.90, -74.7] },
      { name: "Cartagena",    bounds: [9.9,  10.65,-75.90, -75.1] },
      { name: "Cúcuta",       bounds: [7.7,  8.1,  -72.70, -72.4] },
      { name: "Bucaramanga",  bounds: [6.9,  7.2,  -73.20, -73.0] },
      { name: "Pereira",      bounds: [4.7,  4.9,  -75.80, -75.6] },
      { name: "Manizales",    bounds: [4.9,  5.2,  -75.70, -75.4] },
      { name: "Santa Marta",  bounds: [11.1, 11.4, -74.30, -74.0] },
      { name: "Ibagué",       bounds: [4.3,  4.6,  -75.30, -75.0] },
      { name: "Villavicencio",bounds: [4.0,  4.3,  -73.70, -73.4] },
      { name: "Pasto",        bounds: [1.1,  1.4,  -77.40, -77.1] },
      { name: "Armenia",      bounds: [4.4,  4.6,  -75.75, -75.6] },
    ];

    function getCityFromCoords(lat, lon) {
      for (const c of CITY_CENTERS) {
        const [minLat, maxLat, minLng, maxLng] = c.bounds;
        if (lat >= minLat && lat <= maxLat && lon >= minLng && lon <= maxLng) return c.name;
      }
      return "";
    }

    function StoreMap({ onSelectStore }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const allMarkersRef = useRef([]);
      const [status, setStatus] = useState("loading");
      const [allLocations, setAllLocations] = useState([]);
      const [selectedCity, setSelectedCity] = useState("Cartagena");

      const cities = useMemo(
        () => [...new Set(allLocations.map(l => l.city).filter(Boolean))].sort(),
        [allLocations]
      );

      // Filtrar marcadores y hacer pan cuando cambia la ciudad o cargan datos
      useEffect(() => {
        const map = mapInstanceRef.current;
        if (!map || allMarkersRef.current.length === 0) return;
        allMarkersRef.current.forEach(({ marker, city }) => {
          const show = !selectedCity || city === selectedCity;
          if (show && !map.hasLayer(marker)) marker.addTo(map);
          if (!show && map.hasLayer(marker)) map.removeLayer(marker);
        });
        if (selectedCity) {
          const pts = allMarkersRef.current
            .filter(({ city }) => city === selectedCity)
            .map(({ marker }) => marker.getLatLng());
          if (pts.length > 0) {
            const lat = pts.reduce((s, p) => s + p.lat, 0) / pts.length;
            const lng = pts.reduce((s, p) => s + p.lng, 0) / pts.length;
            map.setView([lat, lng], 13);
          }
        }
      }, [selectedCity, allLocations]);

      useEffect(() => {
        if (mapInstanceRef.current || !mapRef.current) return;

        // Centrado en Cartagena por defecto
        const map = L.map(mapRef.current).setView([10.391, -75.479], 12);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
          maxZoom: 19,
        }).addTo(map);
        mapInstanceRef.current = map;

        // Bounding box de Colombia en lugar de area ISO (más rápido y confiable)
        const query = `[out:json][timeout:60];
(
  node["name"~"Éxito|Exito","i"](-4.2,-79.0,12.5,-66.9);
  node["name"="D1"](-4.2,-79.0,12.5,-66.9);
  node["name"~"Carulla","i"](-4.2,-79.0,12.5,-66.9);
  node["name"~"Olímpica|Olimpica","i"](-4.2,-79.0,12.5,-66.9);
  way["name"~"Éxito|Exito","i"](-4.2,-79.0,12.5,-66.9);
  way["name"="D1"](-4.2,-79.0,12.5,-66.9);
  way["name"~"Carulla","i"](-4.2,-79.0,12.5,-66.9);
  way["name"~"Olímpica|Olimpica","i"](-4.2,-79.0,12.5,-66.9);
);
out center;`;

        const OVERPASS_ENDPOINTS = [
          "https://overpass.private.coffee/api/interpreter",
          "https://maps.mail.ru/osm/tools/overpass/api/interpreter",
        ];
        const fetchOverpass = async (q) => {
          for (const url of OVERPASS_ENDPOINTS) {
            try {
              const r = await fetch(url, { method: "POST", body: q });
              if (r.ok) return r.json();
            } catch {}
          }
          throw new Error("All Overpass endpoints failed");
        };

        fetchOverpass(query)
          .then(data => {
            const loaded = [];
            const markers = [];
            (data.elements || []).forEach(el => {
              const lat = el.lat ?? el.center?.lat;
              const lon = el.lon ?? el.center?.lon;
              const name = el.tags?.name || "";
              const storeId = identifyStore(name);
              if (!lat || !lon || !storeId) return;
              const city = el.tags?.["addr:city"] || el.tags?.["addr:suburb"] || el.tags?.["addr:district"] || getCityFromCoords(lat, lon);
              const color = STORE_COLORS[storeId];
              const marker = L.circleMarker([lat, lon], {
                radius: 7, fillColor: color, color: "#fff", weight: 1.5, fillOpacity: 0.9,
              })
              .bindPopup(
                `<div style="font-family:sans-serif;min-width:150px">` +
                `<strong>${name}</strong>` +
                (city ? `<br/><small style="color:#666">${city}</small>` : "") +
                `<br/><button onclick="window.__mapSelect('${storeId}')" ` +
                `style="margin-top:8px;background:${color};color:white;border:none;border-radius:6px;` +
                `padding:5px 12px;cursor:pointer;font-size:12px;font-weight:700;width:100%">` +
                `Ver productos</button></div>`
              )
              .addTo(map);
              markers.push({ marker, city, storeId });
              loaded.push({ lat, lon, name, storeId, city });
            });
            allMarkersRef.current = markers;
            setAllLocations(loaded);
            setStatus("ready");
          })
          .catch(err => { console.error("Overpass error:", err.message); setStatus("error"); });

        window.__mapSelect = (storeId) => onSelectStore(storeId);
        return () => {
          delete window.__mapSelect;
          if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; }
        };
      }, []);

      const visibleCount = selectedCity
        ? allLocations.filter(l => l.city === selectedCity).length
        : allLocations.length;

      return (
        <div style={{ position: "relative" }}>
          <div style={{
            position: "absolute", top: 12, left: "50%", transform: "translateX(-50%)",
            zIndex: 1000, background: "white", borderRadius: 10, padding: "7px 14px",
            boxShadow: "var(--shadow)", fontSize: 12, display: "flex", gap: 12,
            alignItems: "center", whiteSpace: "nowrap",
          }}>
            {status === "loading" && <span style={{ color: "var(--text2)" }}>Cargando desde OpenStreetMap...</span>}
            {status === "error" && <span style={{ color: "#b91c1c" }}>Error al cargar. Intenta de nuevo.</span>}
            {status === "ready" && <>
              <select
                value={selectedCity}
                onChange={e => setSelectedCity(e.target.value)}
                style={{ border: "1px solid var(--border)", borderRadius: 6, padding: "4px 8px", fontSize: 12, fontWeight: 600 }}
              >
                <option value="">Todas las ciudades ({allLocations.length})</option>
                {cities.map(c => (
                  <option key={c} value={c}>{c} ({allLocations.filter(l => l.city === c).length})</option>
                ))}
              </select>
              <span style={{ color: "var(--text2)" }}>{visibleCount} locales</span>
              {Object.entries(STORE_COLORS).map(([id, color]) => (
                <span key={id} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{ width: 10, height: 10, borderRadius: "50%", background: color, display: "inline-block", flexShrink: 0 }}/>
                  <span>{STORE_NAMES[id]}</span>
                </span>
              ))}
            </>}
          </div>
          <div ref={mapRef} style={{ height: "calc(100vh - 130px)", borderRadius: 14, border: "1px solid var(--border)" }} />
        </div>
      );
    }

    function deduplicateProducts(products) {
      const seen = new Map();
      for (const p of products) {
        // URL es el identificador único del producto en cada tienda.
        // Sin URL, caemos a store+title como fallback.
        const key = p.url ? `${p.store}||${p.url}` : `${p.store}||${(p.title || '').toLowerCase().trim()}`;
        if (!seen.has(key)) {
          seen.set(key, p);
        } else {
          // Entre duplicados de la misma URL, conservar el que tiene más historial
          const prev = seen.get(key);
          const prevLen = Array.isArray(prev.history) ? prev.history.length : 0;
          const curLen = Array.isArray(p.history) ? p.history.length : 0;
          if (curLen > prevLen) seen.set(key, p);
        }
      }
      const result = [...seen.values()];
      if (result.length < products.length)
        console.log(`Deduplicados: ${products.length - result.length} registros eliminados`);
      return result;
    }

    function extractSize(title) {
      if (!title) return null;
      const t = title.toLowerCase();
      const mlMatch = t.match(/(\d+(?:[.,]\d+)?)\s*ml\b/);
      if (mlMatch) return `${parseFloat(mlMatch[1].replace(',', '.'))} ml`;
      const lMatch = t.match(/(\d+(?:[.,]\d+)?)\s*(?:l|lt|litros?)\b/);
      if (lMatch) return `${parseFloat(lMatch[1].replace(',', '.'))} L`;
      return null;
    }

    function sizeToMl(size) {
      const m = size.match(/([\d.]+)\s*(ml|L)/);
      if (!m) return 0;
      return m[2] === 'L' ? parseFloat(m[1]) * 1000 : parseFloat(m[1]);
    }

    function App() {
      const [products, setProducts] = useState(deduplicateProducts(STATIC_CATALOG.products || []));
      const [dataSource, setDataSource] = useState("cache");
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState("productos");

      useEffect(() => {
        fetchProductsFromSupabase().then(sbData => {
          if (sbData && sbData.length > 0) {
            setProducts(deduplicateProducts(sbData));
            setDataSource("live");
          }
          setLoading(false);
        });
      }, []);

      const [selectedForComparison, setSelectedForComparison] = useState([]);
      const [showComparisonModal, setShowComparisonModal] = useState(false);
      const [showHistoryModal, setShowHistoryModal] = useState(null);
      const [searchQuery, setSearchQuery] = useState("");
      const [debouncedQuery, setDebouncedQuery] = useState("");
      const [selectedStore, setSelectedStore] = useState("");
      const [drawerMinimized, setDrawerMinimized] = useState(false);
      const [page, setPage] = useState(1);
      const [selectedCategory, setSelectedCategory] = useState("");
      const [selectedSize, setSelectedSize] = useState("");

      useEffect(() => {
        const t = setTimeout(() => setDebouncedQuery(searchQuery), 300);
        return () => clearTimeout(t);
      }, [searchQuery]);

      const fmt = (value) => new Intl.NumberFormat("es-CO", {
        style: "currency",
        currency: "COP",
        minimumFractionDigits: 0,
      }).format(value || 0);

      const filteredProducts = useMemo(() => {
        return products.filter((p) => {
          const matchSearch = p.title?.toLowerCase().includes(debouncedQuery.toLowerCase());
          const matchStore = !selectedStore || p.store === selectedStore;
          const matchCategory = !selectedCategory || p.category === selectedCategory;
          const matchSize = !selectedSize || extractSize(p.title) === selectedSize;
          return matchSearch && matchStore && matchCategory && matchSize;
        });
      }, [products, debouncedQuery, selectedStore, selectedCategory, selectedSize]);

      const PAGE_SIZE = 48;

      useEffect(() => { setPage(1); }, [debouncedQuery, selectedStore, selectedCategory, selectedSize]);

      const visibleProducts = useMemo(
        () => filteredProducts.slice(0, page * PAGE_SIZE),
        [filteredProducts, page]
      );

      const uniqueStores = [...new Set(products.map((p) => p.store))].sort();

      const uniqueCategories = useMemo(
        () => [...new Set(products.map(p => p.category).filter(Boolean))].sort(),
        [products]
      );

      const uniqueSizes = useMemo(() => {
        const sizes = [...new Set(products.map(p => extractSize(p.title)).filter(Boolean))];
        return sizes.sort((a, b) => sizeToMl(a) - sizeToMl(b));
      }, [products]);

      const toggleCompare = (product) => {
        if (selectedForComparison.find((p) => p.id === product.id)) {
          setSelectedForComparison(selectedForComparison.filter((p) => p.id !== product.id));
        } else if (selectedForComparison.length < 4) {
          setSelectedForComparison([...selectedForComparison, product]);
        }
      };

      function StoreBadge({ id, label }) {
        return (
          <span style={{
            display: "inline-flex",
            alignItems: "center",
            fontSize: 11,
            fontWeight: 700,
            color: "white",
            background: STORE_COLORS[id] || "#666",
            borderRadius: 999,
            padding: "3px 9px",
            letterSpacing: ".3px",
          }}>
            {label || id}
          </span>
        );
      }

      function getHistoryStats(product) {
        const history = Array.isArray(product.history) ? product.history : [];
        if (!history.length) {
          return {
            points: [],
            latest: product.price || null,
            yesterday: null,
            weekAgo: null,
            variancePct: null,
            varianceCop: null,
          };
        }

        const points = [...history].sort((a, b) => (a.date || "").localeCompare(b.date || ""));
        const latest = points[points.length - 1]?.price ?? product.price ?? null;
        const yesterday = points.length >= 2 ? points[points.length - 2].price : null;
        const weekAgo = points.length >= 8 ? points[points.length - 8].price : (points[0]?.price ?? null);

        let varianceCop = null;
        let variancePct = null;
        if (latest != null && weekAgo != null) {
          varianceCop = latest - weekAgo;
          variancePct = weekAgo === 0 ? null : (varianceCop / weekAgo) * 100;
        }

        return { points, latest, yesterday, weekAgo, varianceCop, variancePct };
      }

      function HistoryDelta({ varianceCop, variancePct }) {
        const hasCop = varianceCop != null;
        const isUp = hasCop ? varianceCop > 0 : false;
        const isFlat = hasCop ? varianceCop === 0 : false;
        const color = isFlat ? "var(--text2)" : isUp ? "#b42318" : "#067647";
        const copPrefix = isFlat ? "=" : isUp ? "+" : "";
        return (
          <span style={{ fontSize: 12, color, fontWeight: 700 }}>
            {hasCop ? `${copPrefix}${fmt(varianceCop)}` : "N/D"}
            {variancePct == null ? "" : ` (${isFlat ? "=" : isUp ? "+" : ""}${variancePct.toFixed(2)}%)`}
          </span>
        );
      }

      function getPricingContext(product) {
        const history = Array.isArray(product.history) ? product.history : [];
        const signals = [];
        let has_discount = false;
        let discount_pct = 0;
        let reference_price = product.price;
        let discount_start = null;
        let discount_observed_until = null;
        
        if (history.length >= 2) {
          const latest = history[history.length - 1]?.price ?? product.price;
          const previous = history[history.length - 2]?.price ?? latest;
          
          if (latest < previous) {
            signals.push("📉 Bajada de precio");
            has_discount = true;
            discount_pct = ((previous - latest) / previous) * 100;
            reference_price = previous;
          }
        }
        
        return { signals, has_discount, discount_pct, reference_price, discount_start, discount_observed_until };
      }

      function Sparkline({ points }) {
        if (!Array.isArray(points) || points.length < 2) {
          return <div style={{ fontSize: 12, color: "var(--text2)" }}>Sin datos suficientes</div>;
        }

        const prices = points.map(p => p.price || 0).filter(p => p > 0);
        if (prices.length === 0) return null;

        const minPrice = Math.min(...prices);
        const maxPrice = Math.max(...prices);
        const range = maxPrice - minPrice || 1;
        
        const width = 100 * (points.length - 1);
        const svgHeight = 40;
        const chartHeight = 30;
        const padding = 5;

        const pathData = points
          .map((p, i) => {
            const x = (i / (points.length - 1)) * width;
            const price = p.price || minPrice;
            const y = svgHeight - padding - ((price - minPrice) / range) * chartHeight;
            return `${x},${y}`;
          })
          .join(' L ');

        return (
          <svg
            width="100%"
            height={svgHeight}
            viewBox={`0 0 ${width} ${svgHeight}`}
            style={{ border: "1px solid var(--border)", borderRadius: 8 }}
          >
            <polyline
              points={pathData}
              fill="none"
              stroke="var(--accent)"
              strokeWidth="2"
              vectorEffect="non-scaling-stroke"
            />
          </svg>
        );
      }

      function formatEventSignals(signals) {
        if (!Array.isArray(signals) || signals.length === 0) {
          return null;
        }
        return signals.join(" • ");
      }

      function Card({ product, selected, onToggleSelect, onOpenHistory }) {
        const stats = getHistoryStats(product);
        const pricing = getPricingContext(product);
        const signalSummary = formatEventSignals(pricing.signals);
        return (
          <article
            onClick={() => onToggleSelect(product)}
            title="Click para seleccionar o quitar de comparación"
            className="product-card"
            style={{
              background: "var(--surface)",
              border: selected ? "2px solid var(--accent)" : "1px solid var(--border)",
              borderRadius: "var(--radius)",
              boxShadow: "var(--shadow)",
              position: "relative",
              display: "flex",
              flexDirection: "column",
              padding: 14,
              gap: 10,
              cursor: "pointer",
              transition: "transform .15s ease, box-shadow .15s ease",
            }}
          >
            {selected && (
              <span style={{
                position: "absolute",
                top: 8,
                left: 8,
                background: "var(--accent)",
                color: "white",
                borderRadius: 999,
                fontSize: 10,
                fontWeight: 700,
                padding: "4px 8px",
                letterSpacing: ".2px",
                zIndex: 2,
              }}>
                Seleccionado
              </span>
            )}
            <div style={{
              width: "100%",
              aspectRatio: "1/1",
              borderRadius: 10,
              border: "1px solid var(--border)",
              background: "#f8f8f8",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              overflow: "hidden",
            }}>
              {product.img ? (
                <img src={product.img} alt={product.title} style={{ width: "100%", height: "100%", objectFit: "contain" }} />
              ) : (
                <span style={{ fontSize: 12, color: "var(--text2)" }}>sin imagen</span>
              )}
            </div>

            <StoreBadge id={product.store} label={product.store_name || product.store} />

            <h3 style={{ fontSize: 14, lineHeight: 1.35, minHeight: 40 }}>{product.title}</h3>

            <p style={{ fontSize: 12, color: "var(--text2)" }}>
              {product.category || "Otros"}
            </p>

            <div style={{
              marginTop: 4,
              border: "1px solid var(--border)",
              borderRadius: 10,
              padding: 8,
              background: "#fafafa",
              display: "grid",
              gap: 4,
            }}>
              <p style={{ fontSize: 11, color: "var(--text2)" }}>Ayer: <strong style={{ color: "var(--text)" }}>{stats.yesterday == null ? "N/D" : fmt(stats.yesterday)}</strong></p>
              <p style={{ fontSize: 11, color: "var(--text2)" }}>Semana: <strong style={{ color: "var(--text)" }}>{stats.weekAgo == null ? "N/D" : fmt(stats.weekAgo)}</strong></p>
              <p style={{ fontSize: 11, color: "var(--text2)" }}>Varianza: <HistoryDelta varianceCop={stats.varianceCop} variancePct={stats.variancePct} /></p>
              {pricing.has_discount ? <p style={{ fontSize: 11, color: "#067647", fontWeight: 700 }}>Descuento: {pricing.discount_pct != null ? `${pricing.discount_pct.toFixed(2)}%` : "N/D"}</p> : null}
              {signalSummary ? <p style={{ fontSize: 10, color: "var(--text2)" }}>{signalSummary}</p> : null}
            </div>

            <div style={{ marginTop: "auto", paddingTop: 8, borderTop: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
              <strong style={{ fontFamily: "Sora", color: "var(--accent)", fontSize: 18 }}>{fmt(product.price)}</strong>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "flex-end" }}>
                <button onClick={(e) => { e.stopPropagation(); onToggleSelect(product); }} style={{
                  fontSize: 11,
                  fontWeight: 700,
                  color: selected ? "white" : "var(--accent)",
                  background: selected ? "var(--accent)" : "white",
                  border: "1px solid var(--accent)",
                  borderRadius: 8,
                  padding: "5px 8px",
                  cursor: "pointer",
                }}>{selected ? "Seleccionado" : "Comparar"}</button>
                <button onClick={(e) => { e.stopPropagation(); onOpenHistory(product); }} style={{
                  fontSize: 11,
                  fontWeight: 700,
                  color: "var(--text)",
                  background: "white",
                  border: "1px solid var(--border)",
                  borderRadius: 8,
                  padding: "5px 8px",
                  cursor: "pointer",
                }}>Historico</button>
                <a href={product.url} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} style={{
                  fontSize: 11,
                  fontWeight: 700,
                  color: "var(--accent)",
                  textDecoration: "none",
                  border: "1px solid var(--accent)",
                  borderRadius: 8,
                  padding: "5px 8px",
                }}>Ver</a>
              </div>
            </div>
          </article>
        );
      }

      function ComparisonDrawer({ items, open, minimized, onRemove, onClear, onCompare, onToggleMinimize }) {
        if (minimized && items && items.length > 0) {
          return (
            <aside style={{
              position: "fixed",
              top: 88,
              right: 14,
              width: 220,
              height: 56,
              overflow: "hidden",
              background: "white",
              border: "1px solid var(--border)",
              borderRadius: 12,
              boxShadow: "var(--shadow)",
              zIndex: 60,
              display: "flex",
              alignItems: "center",
              gap: 10,
              padding: "8px 10px",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1 }}>
                <strong style={{ fontFamily: "Sora", fontSize: 13 }}>{items.length}/4</strong>
                <div style={{ display: "flex", gap: 6 }}>
                  {items.slice(0, 3).map((it) => (
                    <img key={it.id} src={it.img || ""} alt={it.title} style={{ width: 36, height: 36, objectFit: "cover", borderRadius: 6 }} />
                  ))}
                </div>
              </div>
              <button onClick={() => onToggleMinimize(false)} style={{ border: "1px solid var(--border)", background: "white", borderRadius: 8, padding: "6px 8px", cursor: "pointer" }}>▸</button>
            </aside>
          );
        }

        return (
          <aside className={open ? "drawer-enter" : "drawer-exit"} style={{
            position: "fixed",
            top: 88,
            right: 14,
            width: 320,
            maxHeight: "calc(100vh - 104px)",
            overflowY: "auto",
            background: "white",
            border: "1px solid var(--border)",
            borderRadius: 14,
            boxShadow: "var(--shadow)",
            zIndex: 40,
            transition: "transform .24s ease, opacity .24s ease",
            display: "grid",
            gridTemplateRows: "auto 1fr auto",
          }}>
            <div style={{ padding: 12, borderBottom: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <p style={{ fontFamily: "Sora", fontSize: 14, fontWeight: 700 }}>Selección para comparar</p>
                <p style={{ fontSize: 11, color: "var(--text2)" }}>{items.length}/4 artículos</p>
              </div>
              <button onClick={() => onToggleMinimize(true)} style={{ border: "1px solid var(--border)", background: "white", borderRadius: 8, cursor: "pointer", padding: "6px 8px" }}>▸</button>
            </div>

            <div style={{ padding: 10, display: "grid", gap: 8 }}>
              {items.length ? items.map((item) => (
                <div key={item.id} style={{ border: "1px solid var(--border)", borderRadius: 10, padding: 8, display: "grid", gridTemplateColumns: "1fr auto", gap: 8 }}>
                  <div>
                    <StoreBadge id={item.store} label={item.store_name || item.store} />
                    <p style={{ fontSize: 12, marginTop: 5 }}>{item.title}</p>
                    <p style={{ fontSize: 12, color: "var(--accent)", fontWeight: 700, marginTop: 3 }}>{fmt(item.price)}</p>
                  </div>
                  <button onClick={() => onRemove(item)} style={{ border: "1px solid var(--border)", background: "white", borderRadius: 8, cursor: "pointer", width: 26, height: 26 }}>×</button>
                </div>
              )) : (
                <div style={{ fontSize: 12, color: "var(--text2)", padding: 10 }}>Haz click en tarjetas para comparar</div>
              )}
            </div>

            <div style={{ padding: 10, borderTop: "1px solid var(--border)" }}>
              <button
                disabled={items.length < 2}
                onClick={onCompare}
                style={{
                  width: "100%",
                  border: "none",
                  borderRadius: 10,
                  padding: 10,
                  fontWeight: 700,
                  cursor: items.length >= 2 ? "pointer" : "not-allowed",
                  background: items.length >= 2 ? "var(--accent)" : "#d0d5dd",
                  color: "white",
                }}
              >
                Ver Comparación
              </button>
            </div>
          </aside>
        );
      }

      function ComparisonModal({ items, onClose, onRemove }) {
        const prices = items.map((p) => p.price || 0);
        const min = prices.length ? Math.min(...prices) : 0;
        const categories = [...new Set(items.map(i => i.category).filter(Boolean))];
        const categoryMismatch = categories.length > 1;

        return (
          <div style={{
            position: "fixed",
            inset: 0,
            background: "rgba(0,0,0,.45)",
            zIndex: 80,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            padding: 18,
          }} onClick={onClose}>
            <div style={{
              width: "min(1100px, 100%)",
              maxHeight: "90vh",
              overflowY: "auto",
              background: "white",
              borderRadius: 16,
              border: "1px solid var(--border)",
              boxShadow: "var(--shadow)",
              padding: 16,
            }} onClick={(e) => e.stopPropagation()}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <h3 style={{ fontFamily: "Sora", fontSize: 20 }}>Comparacion de productos</h3>
                <button onClick={onClose} style={{ border: "none", background: "none", cursor: "pointer", fontSize: 24, lineHeight: 1 }}>×</button>
              </div>
              <p style={{ fontSize: 13, color: "var(--text2)", marginBottom: 12 }}>
                Puedes comparar hasta 4 articulos de la misma tienda o de tiendas distintas.
              </p>
              {categoryMismatch && (
                <div style={{
                  background: "#fef3c7",
                  border: "1px solid #f59e0b",
                  borderRadius: 10,
                  padding: "10px 14px",
                  marginBottom: 14,
                  fontSize: 13,
                  color: "#92400e",
                  display: "flex",
                  gap: 8,
                  alignItems: "flex-start",
                }}>
                  <span style={{ fontSize: 16, flexShrink: 0 }}>⚠️</span>
                  <span>
                    Estás comparando productos de categorías diferentes (<strong>{categories.join(", ")}</strong>). La comparación puede no ser útil entre artículos de distinto tipo.
                  </span>
                </div>
              )}

              <div style={{
                display: "grid",
                gridTemplateColumns: `repeat(${Math.max(items.length, 1)}, minmax(180px, 1fr))`,
                gap: 12,
              }}>
                {items.map((item) => {
                  const stats = getHistoryStats(item);
                  const isCheapest = (item.price || 0) === min;
                  return (
                    <div key={item.id} style={{ border: "1px solid var(--border)", borderRadius: 12, padding: 12, background: isCheapest ? "var(--accent-light)" : "white" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 6 }}>
                        <StoreBadge id={item.store} label={item.store_name || item.store} />
                        <button onClick={() => onRemove(item)} style={{ border: "none", background: "none", cursor: "pointer", color: "var(--text2)", fontSize: 18 }}>×</button>
                      </div>
                      <h4 style={{ fontSize: 13, marginTop: 8, minHeight: 36 }}>{item.title}</h4>
                      <p style={{ marginTop: 8, fontFamily: "Sora", fontWeight: 700, color: "var(--accent)", fontSize: 18 }}>{fmt(item.price)}</p>
                      {isCheapest && <p style={{ fontSize: 11, color: "#067647", fontWeight: 700 }}>Mas barato</p>}

                      <div style={{ marginTop: 10, borderTop: "1px solid var(--border)", paddingTop: 8, display: "grid", gap: 5 }}>
                        <p style={{ fontSize: 12, color: "var(--text2)" }}>Ayer: <strong style={{ color: "var(--text)" }}>{stats.yesterday == null ? "N/D" : fmt(stats.yesterday)}</strong></p>
                        <p style={{ fontSize: 12, color: "var(--text2)" }}>Semana pasada: <strong style={{ color: "var(--text)" }}>{stats.weekAgo == null ? "N/D" : fmt(stats.weekAgo)}</strong></p>
                        <p style={{ fontSize: 12, color: "var(--text2)" }}>Varianza: <HistoryDelta varianceCop={stats.varianceCop} variancePct={stats.variancePct} /></p>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }

      function HistoryModal({ product, onClose }) {
        const stats = getHistoryStats(product);
        const pricing = getPricingContext(product);
        const signalSummary = formatEventSignals(pricing.signals);
        return (
          <div style={{
            position: "fixed",
            inset: 0,
            background: "rgba(0,0,0,.45)",
            zIndex: 75,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            padding: 18,
          }} onClick={onClose}>
            <div style={{
              width: "min(760px, 100%)",
              background: "white",
              borderRadius: 16,
              border: "1px solid var(--border)",
              boxShadow: "var(--shadow)",
              padding: 16,
            }} onClick={(e) => e.stopPropagation()}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <h3 style={{ fontFamily: "Sora", fontSize: 20 }}>Historico de precio</h3>
                <button onClick={onClose} style={{ border: "none", background: "none", cursor: "pointer", fontSize: 24, lineHeight: 1 }}>×</button>
              </div>
              <StoreBadge id={product.store} label={product.store_name || product.store} />
              <h4 style={{ marginTop: 10, fontSize: 16 }}>{product.title}</h4>

              <div style={{
                marginTop: 14,
                display: "grid",
                gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))",
                gap: 10,
              }}>
                <div style={{ border: "1px solid var(--border)", borderRadius: 10, padding: 10 }}>
                  <p style={{ fontSize: 11, color: "var(--text2)" }}>Precio actual</p>
                  <p style={{ fontFamily: "Sora", fontWeight: 700 }}>{stats.latest == null ? "N/D" : fmt(stats.latest)}</p>
                </div>
                <div style={{ border: "1px solid var(--border)", borderRadius: 10, padding: 10 }}>
                  <p style={{ fontSize: 11, color: "var(--text2)" }}>Ayer</p>
                  <p style={{ fontFamily: "Sora", fontWeight: 700 }}>{stats.yesterday == null ? "N/D" : fmt(stats.yesterday)}</p>
                </div>
                <div style={{ border: "1px solid var(--border)", borderRadius: 10, padding: 10 }}>
                  <p style={{ fontSize: 11, color: "var(--text2)" }}>Semana pasada</p>
                  <p style={{ fontFamily: "Sora", fontWeight: 700 }}>{stats.weekAgo == null ? "N/D" : fmt(stats.weekAgo)}</p>
                </div>
                <div style={{ border: "1px solid var(--border)", borderRadius: 10, padding: 10 }}>
                  <p style={{ fontSize: 11, color: "var(--text2)" }}>Varianza</p>
                  <p><HistoryDelta varianceCop={stats.varianceCop} variancePct={stats.variancePct} /></p>
                </div>
              </div>

              <div style={{ marginTop: 12 }}>
                <p style={{ fontSize: 12, color: "var(--text2)", marginBottom: 6 }}>Tendencia de precio</p>
                <Sparkline points={stats.points} />
              </div>

              <div style={{ marginTop: 12, border: "1px solid var(--border)", borderRadius: 10, padding: 10, background: "#fbfdff" }}>
                <p style={{ fontSize: 11, color: "var(--text2)" }}>Lectura de descuento</p>
                <p style={{ marginTop: 4, fontSize: 13, fontWeight: 600 }}>
                  {pricing.has_discount ? `Descuento estimado de ${pricing.discount_pct != null ? pricing.discount_pct.toFixed(2) : "0.00"}% sobre ${fmt(pricing.reference_price)}` : "Sin descuento claro en el historial observado"}
                </p>
                {pricing.discount_start && pricing.discount_observed_until ? (
                  <p style={{ marginTop: 4, fontSize: 12, color: "var(--text2)" }}>
                    Detectado desde {pricing.discount_start} y vigente al menos hasta {pricing.discount_observed_until}.
                  </p>
                ) : null}
                {signalSummary ? <p style={{ marginTop: 4, fontSize: 12, color: "var(--text2)" }}>{signalSummary}</p> : null}
              </div>

              <div style={{ marginTop: 14, borderTop: "1px solid var(--border)", paddingTop: 10 }}>
                <p style={{ fontSize: 12, color: "var(--text2)", marginBottom: 8 }}>Registros disponibles ({stats.points.length})</p>
                <div style={{ maxHeight: 220, overflowY: "auto", border: "1px solid var(--border)", borderRadius: 10 }}>
                  {stats.points.length ? stats.points.map((point) => (
                    <div key={`${point.date}-${point.price}`} style={{ display: "flex", justifyContent: "space-between", padding: "8px 10px", borderTop: "1px solid var(--border)", fontSize: 13 }}>
                      <span>{point.date}</span>
                      <strong>{fmt(point.price)}</strong>
                    </div>
                  )) : <div style={{ padding: 10, fontSize: 13, color: "var(--text2)" }}>No hay historial suficiente todavia.</div>}
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ minHeight: "100vh", display: "grid", gridTemplateRows: "auto 1fr" }}>
          <header style={{ borderBottom: "1px solid var(--border)", background: "var(--surface)" }}>
            <div style={{ maxWidth: 1200, margin: "0 auto", padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <h1 style={{ fontFamily: "Sora", fontSize: 20, fontWeight: 700 }}>LicorScan</h1>
                <div style={{ display: "flex", background: "var(--bg)", borderRadius: 8, padding: 2, gap: 2 }}>
                  {[["productos", "Productos"], ["locales", "Locales"]].map(([tab, label]) => (
                    <button key={tab} onClick={() => setActiveTab(tab)} style={{
                      border: "none", borderRadius: 6, padding: "5px 14px", fontSize: 12, fontWeight: 600,
                      cursor: "pointer",
                      background: activeTab === tab ? "white" : "transparent",
                      color: activeTab === tab ? "var(--accent)" : "var(--text2)",
                      boxShadow: activeTab === tab ? "0 1px 3px rgba(0,0,0,.1)" : "none",
                    }}>{label}</button>
                  ))}
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <span className={`data-source-badge ${dataSource}`}>
                  {dataSource === "live" ? "🔴 Datos en vivo" : "💾 Datos cacheados"}
                </span>
                {loading && <span style={{ fontSize: 12, color: "var(--text2)" }}>Actualizando...</span>}
              </div>
              {selectedForComparison.length > 0 && (
                <div style={{ display: "flex", gap: 8 }}>
                  <button
                    onClick={() => setShowComparisonModal(true)}
                    disabled={selectedForComparison.length < 2}
                    style={{
                      border: "none",
                      background: selectedForComparison.length >= 2 ? "var(--accent)" : "#d0d5dd",
                      color: "white",
                      borderRadius: 8,
                      padding: "8px 12px",
                      cursor: selectedForComparison.length >= 2 ? "pointer" : "not-allowed",
                      fontSize: 12,
                      fontWeight: 700,
                    }}
                  >
                    Comparar ({selectedForComparison.length})
                  </button>
                  <button
                    onClick={() => setDrawerMinimized(!drawerMinimized)}
                    style={{
                      border: "1px solid var(--border)",
                      background: "white",
                      borderRadius: 8,
                      padding: "8px 12px",
                      cursor: "pointer",
                      fontSize: 12,
                      fontWeight: 600,
                    }}
                  >
                    {drawerMinimized ? "Ocultar panel" : "Mostrar panel"}
                  </button>
                </div>
              )}
            </div>
          </header>

          <main style={{ maxWidth: 1400, margin: "0 auto", padding: 14, width: "100%" }}>
            {activeTab === "locales" ? (
              <StoreMap onSelectStore={(storeId) => { setSelectedStore(storeId); setActiveTab("productos"); }} />
            ) : (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 320px", gap: 14 }}>
            <div>
              <div style={{ display: "grid", gap: 12, marginBottom: 16 }}>
                <input
                  type="text"
                  placeholder="Buscar productos..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  style={{
                    border: "1px solid var(--border)",
                    borderRadius: 10,
                    padding: "10px 12px",
                    fontSize: 14,
                  }}
                />
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
                  <select
                    value={selectedStore}
                    onChange={(e) => setSelectedStore(e.target.value)}
                    style={{ border: "1px solid var(--border)", borderRadius: 10, padding: "10px 12px", fontSize: 14 }}
                  >
                    <option value="">Todas las tiendas ({products.length})</option>
                    {uniqueStores.map((store) => (
                      <option key={store} value={store}>
                        {store} ({products.filter((p) => p.store === store).length})
                      </option>
                    ))}
                  </select>
                  <select
                    value={selectedCategory}
                    onChange={(e) => setSelectedCategory(e.target.value)}
                    style={{ border: "1px solid var(--border)", borderRadius: 10, padding: "10px 12px", fontSize: 14 }}
                  >
                    <option value="">Todas las categorías</option>
                    {uniqueCategories.map((cat) => (
                      <option key={cat} value={cat}>{cat}</option>
                    ))}
                  </select>
                  <select
                    value={selectedSize}
                    onChange={(e) => setSelectedSize(e.target.value)}
                    style={{ border: "1px solid var(--border)", borderRadius: 10, padding: "10px 12px", fontSize: 14 }}
                  >
                    <option value="">Todos los tamaños</option>
                    {uniqueSizes.map((size) => (
                      <option key={size} value={size}>{size}</option>
                    ))}
                  </select>
                </div>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12 }}>
                {filteredProducts.length ? (
                  visibleProducts.map((product) => (
                    <Card
                      key={product.id}
                      product={product}
                      selected={selectedForComparison.some((p) => p.id === product.id)}
                      onToggleSelect={toggleCompare}
                      onOpenHistory={setShowHistoryModal}
                    />
                  ))
                ) : (
                  <div style={{ gridColumn: "1 / -1", padding: 40, textAlign: "center", color: "var(--text2)" }}>
                    No se encontraron productos
                  </div>
                )}
              </div>
              {visibleProducts.length < filteredProducts.length && (
                <div style={{ textAlign: "center", marginTop: 16 }}>
                  <button
                    onClick={() => setPage(p => p + 1)}
                    style={{
                      border: "1px solid var(--accent)",
                      background: "white",
                      color: "var(--accent)",
                      borderRadius: 10,
                      padding: "10px 24px",
                      fontSize: 14,
                      fontWeight: 600,
                      cursor: "pointer",
                    }}
                  >
                    Cargar más ({filteredProducts.length - visibleProducts.length} restantes)
                  </button>
                </div>
              )}
            </div>

            {showComparisonModal && (
              <ComparisonModal
                items={selectedForComparison}
                onClose={() => setShowComparisonModal(false)}
                onRemove={(item) => setSelectedForComparison(selectedForComparison.filter((p) => p.id !== item.id))}
              />
            )}

            {showHistoryModal && (
              <HistoryModal
                product={showHistoryModal}
                onClose={() => setShowHistoryModal(null)}
              />
            )}

            <ComparisonDrawer
              items={selectedForComparison}
              open={showComparisonModal}
              minimized={drawerMinimized}
              onRemove={(item) => setSelectedForComparison(selectedForComparison.filter((p) => p.id !== item.id))}
              onCompare={() => setShowComparisonModal(true)}
              onClear={() => setSelectedForComparison([])}
              onToggleMinimize={setDrawerMinimized}
            />
            </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
